function formatDate(dateStr){
  return new Date(dateStr).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
}

function daysUntil(dateStr){
  return Math.ceil((new Date(dateStr)-new Date())/(1000*60*60*24));
}

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id'));
const opp = opportunities.find(o=>o.id===id);

if (opp) {
  document.title = opp.title + ' — Studera';
  document.getElementById('breadcrumbTitle').textContent = opp.title;
  const days = daysUntil(opp.deadline);
  let dlText;
  if (days < 0) {
    dlText = 'Deadline Passed';
  } else if (days <= 7) {
    dlText = `${days} days left — Act Fast!`;
  } else if (days <= 30) {
    dlText = `${days} days remaining`;
  } else {
    dlText = `Deadline: ${formatDate(opp.deadline)}`;
  }
   const paragraphs = opp.fullDesc.split('\n\n').map(p => `<p>${p}</p>`).join('');
  
  document.getElementById('oppDetail').innerHTML = `

        <div class="detail-item"><div class="detail-item-label">Nationality</div><div class="detail-item-value">${opp.nationality === 'international' ? 'International' : opp.nationality === 'usa' ? 'USA Only' : 'Pakistan Only'}</div></div>
